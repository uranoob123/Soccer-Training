<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Football IQ Trainer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; user-select: none; }
        
        #ui { position: absolute; top: 40px; left: 40px; color: white; pointer-events: none; z-index: 10; }
        h2 { font-size: 52px; font-weight: 900; margin: 0; line-height: 1; color: #fff; text-shadow: 0 4px 15px rgba(0,255,136,0.4); font-style: italic; letter-spacing: -1px; text-transform: uppercase;}
        .subtitle { color: #00ff88; font-weight: 700; letter-spacing: 3px; font-size: 14px; margin-bottom: 5px; text-transform: uppercase; transition: color 0.3s; }
        .controls-hint { font-size: 12px; color: #aaa; margin-top: 10px; background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 6px; backdrop-filter: blur(4px); display: inline-block; border: 1px solid rgba(255,255,255,0.1); }

        #controls { 
            position: absolute; top: 40px; right: 40px; background: rgba(15, 20, 25, 0.7); 
            padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); color: white; z-index: 30;
            width: 250px; pointer-events: auto; backdrop-filter: blur(12px); box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        #difficulty-slider { width: 100%; cursor: pointer; accent-color: #00ff88; margin-top: 15px; }
        .diff-text { font-size: 12px; font-weight: 700; color: #ccc; letter-spacing: 1px;}
        .diff-val { color: #00ff88; float: right; font-size: 18px; font-weight: 900; }

        .hud-container { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; pointer-events: none; }
        .hud-box { background: rgba(0,0,0,0.5); padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hud-label { color: #aaa; font-size: 10px; font-weight: 800; letter-spacing: 1.5px; margin-bottom: 8px; }
        .bar-bg { width: 180px; height: 10px; background: rgba(0,0,0,0.8); border-radius: 5px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        
        #timer-bar { height: 100%; background: #fff; width: 100%; transition: width 0.1s linear; }
        #stamina-bar { height: 100%; background: #00d4ff; width: 100%; box-shadow: 0 0 10px #00d4ff; }
        #power-bar { height: 100%; background: linear-gradient(90deg, #00ff88, #ffcc00, #ff2222); width: 0%; transition: width 0.05s; box-shadow: 0 0 15px rgba(255, 34, 34, 0.5); }

        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
            background: rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: difference; transition: transform 0.1s;
        }

        #feedback { 
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            display: none; z-index: 20; text-align: center; padding: 20px 80px; border-radius: 20px; 
            background: rgba(10,10,15,0.9); border: 2px solid white; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(255,255,255,0.05); backdrop-filter: blur(15px);
        }
        #fb-main { font-size: 4.5rem; font-weight: 900; font-style: italic; letter-spacing: 2px; line-height: 1; text-transform: uppercase; }
        .feedback-sub { font-size: 1.2rem; font-weight: 700; color: #aaa; letter-spacing: 2px; margin-top: 15px; text-transform: uppercase; }
        
        #overlay { position: absolute; inset: 0; background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.6) 100%); pointer-events: none; z-index: 5; }
    </style>
</head>
<body>
    <div id="overlay"></div>
    <div id="ui">
        <div class="subtitle" id="scenario-banner">SCENARIO // LOADING...</div>
        <h2>FOOTBALL IQ TRAINER</h2>
        <div class="controls-hint">W/A/S/D: MOVE &nbsp;|&nbsp; SHIFT: SPRINT &nbsp;|&nbsp; SPACE: PASS/SHOOT (HOLD FOR POWER)</div>
    </div>

    <div id="controls">
        <div class="diff-text">DEFENDER PRESS <span class="diff-val" id="diff-label">70</span></div>
        <input type="range" id="difficulty-slider" min="1" max="100" value="70">
    </div>

    <div class="hud-container">
        <div class="hud-box">
            <div class="hud-label">MATCH CLOCK</div>
            <div class="bar-bg"><div id="timer-bar"></div></div>
        </div>
        <div class="hud-box">
            <div class="hud-label">STAMINA</div>
            <div class="bar-bg"><div id="stamina-bar"></div></div>
        </div>
        <div class="hud-box">
            <div class="hud-label">KICK POWER</div>
            <div class="bar-bg"><div id="power-bar"></div></div>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="feedback">
        <div id="fb-main">ELITE VISION</div>
        <div id="fb-sub" class="feedback-sub">DEFENSIVE LINES BROKEN</div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        // --- GAME CONSTANTS ---
        const GRAVITY = 9.81, RESTITUTION = 0.75, ROLLING_FRICTION = 0.96; 
        const PW = 50, PL = 75; 
        const BALL_RADIUS = 0.22;
        const BASE_FOV = 80, SPRINT_FOV = 95;

        // --- DOM ELEMENTS ---
        const slider = document.getElementById('difficulty-slider');
        slider.oninput = () => { document.getElementById('diff-label').innerText = slider.value; };
        const fbContainer = document.getElementById('feedback');
        const fbMain = document.getElementById('fb-main');
        const fbSub = document.getElementById('fb-sub');
        const crosshair = document.getElementById('crosshair');

        // --- SCENE SETUP (OPTIMIZED) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050a10);
        scene.fog = new THREE.FogExp2(0x050a10, 0.005);

        const camera = new THREE.PerspectiveCamera(BASE_FOV, window.innerWidth / window.innerHeight, 0.1, 1000);
        let cameraTargetPos = new THREE.Vector3();
        
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setPixelRatio(1); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.BasicShadowMap; 
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING (OPTIMIZED) ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.6)); 
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(20, 60, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 512; 
        dirLight.shadow.mapSize.height = 512;
        dirLight.shadow.camera.left = -PW;
        dirLight.shadow.camera.right = PW;
        dirLight.shadow.camera.top = PL;
        dirLight.shadow.camera.bottom = -PL;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 150;
        scene.add(dirLight);

        // --- STADIUM & PITCH ---
        const pitchGroup = new THREE.Group();
        const darkGrass = new THREE.MeshStandardMaterial({ color: 0x1a4015, roughness: 1.0 });
        const lightGrass = new THREE.MeshStandardMaterial({ color: 0x1f4a19, roughness: 1.0 });
        
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(PW*2.5, PL*2.5), darkGrass);
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; pitchGroup.add(ground);

        for (let z = -PL; z < PL; z += 10) {
            const stripe = new THREE.Mesh(new THREE.PlaneGeometry(PW*2, 5), lightGrass);
            stripe.rotation.x = -Math.PI / 2; stripe.position.set(0, 0.01, z + 2.5);
            stripe.receiveShadow = true; pitchGroup.add(stripe);
        }

        const lineMat = new THREE.MeshBasicMaterial({ color: 0xeeeeee });
        function addLine(w, h, x, z) {
            const l = new THREE.Mesh(new THREE.PlaneGeometry(w, h), lineMat);
            l.rotation.x = -Math.PI / 2; l.position.set(x, 0.02, z); pitchGroup.add(l);
        }
        addLine(PW*2, 0.3, 0, 0); addLine(PW*2, 0.3, 0, -PL); addLine(PW*2, 0.3, 0, PL); 
        addLine(0.3, PL*2, -PW, 0); addLine(0.3, PL*2, PW, 0); 
        addLine(40, 0.3, 0, -PL + 16.5); addLine(40, 0.3, 0, PL - 16.5); 
        addLine(0.3, 16.5, -20, -PL + 8.25); addLine(0.3, 16.5, 20, -PL + 8.25); 

        const circle = new THREE.Mesh(new THREE.RingGeometry(9.15, 9.45, 32), lineMat); 
        circle.rotation.x = -Math.PI / 2; circle.position.y = 0.02; pitchGroup.add(circle);
        
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x0a0f14, roughness: 0.8 });
        const topWallMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 }); 
        function buildWall(w, d, x, z) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(w, 2, d), wallMat);
            b.position.set(x, 1, z); b.receiveShadow = true; b.castShadow = true; pitchGroup.add(b);
            const top = new THREE.Mesh(new THREE.BoxGeometry(w, 0.2, d), topWallMat);
            top.position.set(x, 2.1, z); pitchGroup.add(top);
        }
        buildWall(PW*2 + 10, 1, 0, -PL - 5); buildWall(PW*2 + 10, 1, 0, PL + 5);
        buildWall(1, PL*2 + 10, -PW - 5, 0); buildWall(1, PL*2 + 10, PW + 5, 0);

        scene.add(pitchGroup);

        // --- GOALS ---
        function createGoal(zPos, rotY) {
            const group = new THREE.Group();
            const postMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 });
            const netMat = new THREE.MeshBasicMaterial({ color: 0xcccccc, wireframe: true, transparent: true, opacity: 0.2 });
            
            const pGeo = new THREE.CylinderGeometry(0.08, 0.08, 2.44, 8); 
            const lp = new THREE.Mesh(pGeo, postMat); lp.position.set(-3.66, 1.22, 0); lp.castShadow = true; group.add(lp);
            const rp = new THREE.Mesh(pGeo, postMat); rp.position.set(3.66, 1.22, 0); rp.castShadow = true; group.add(rp);
            const cb = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 7.32, 8), postMat);
            cb.rotation.z = Math.PI / 2; cb.position.set(0, 2.44, 0); cb.castShadow = true; group.add(cb);
            
            const backNet = new THREE.Mesh(new THREE.PlaneGeometry(7.32, 2.44), netMat);
            backNet.position.set(0, 1.22, -2); group.add(backNet);
            const topNet = new THREE.Mesh(new THREE.PlaneGeometry(7.32, 2), netMat);
            topNet.rotation.x = -Math.PI / 2; topNet.position.set(0, 2.44, -1); group.add(topNet);

            group.position.set(0, 0, zPos); group.rotation.y = rotY; scene.add(group);
        }
        createGoal(-PL, 0); createGoal(PL, Math.PI);

        // --- GAME STATE ---
        let teammates = [], defenders = [], ball = null, trailLine = null, trailPoints = [];
        let oppGoalKeeper = null; 
        let ballVel = new THREE.Vector3(), isBallInFlight = false, isRoundActive = false;
        let aimedReceiver = null, tacticalBestTeammate = null, idealScoreAtKick = -Infinity;
        let playerVel = new THREE.Vector3(), playerPos = new THREE.Vector3(0, 0, 20), playerPosAtKick = new THREE.Vector3();
        let playerStamina = 100, isCharging = false, chargeValue = 0, yaw = 0, pitchRot = 0;
        let keys = { w: false, a: false, s: false, d: false, shift: false };
        let lastTime = performance.now(), matchClock = 20;

        // --- GLOBAL SHARED GEOMETRIES & MATERIALS ---
        const ballGeo = new THREE.IcosahedronGeometry(BALL_RADIUS, 1); 
        const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
        const trailMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
        const skinMat = new THREE.MeshStandardMaterial({ color: 0xd2a679, roughness: 0.8 });
        
        const botTorsoGeo = new THREE.BoxGeometry(0.6, 0.7, 0.3); 
        const botShortsGeo = new THREE.BoxGeometry(0.6, 0.4, 0.3);
        const botLimbGeo = new THREE.BoxGeometry(0.2, 0.7, 0.2); 
        const botHeadGeo = new THREE.SphereGeometry(0.22, 8, 8); 

        // --- PLAYER BOT CLASS ---
        class PlayerBot {
            constructor(primaryColor, secondaryColor, role, idOffset) {
                this.group = new THREE.Group();
                this.role = role; 
                this.id = idOffset;
                this.baseSpeed = (role === 'defender' || role === 'oppGoalie') ? 10.0 : 12.0;
                this.baseZ = 0; 

                this.shirtMat = new THREE.MeshStandardMaterial({ color: primaryColor, roughness: 0.8 });
                this.shortsMat = new THREE.MeshStandardMaterial({ color: secondaryColor, roughness: 0.8 });

                this.torso = new THREE.Mesh(botTorsoGeo, this.shirtMat); this.torso.position.y = 1.35; this.torso.castShadow = true;
                this.shorts = new THREE.Mesh(botShortsGeo, this.shortsMat); this.shorts.position.y = 0.8; this.shorts.castShadow = true;
                this.head = new THREE.Mesh(botHeadGeo, skinMat); this.head.position.y = 1.85; this.head.castShadow = true;

                this.legL = new THREE.Group(); this.legL.position.set(-0.15, 0.6, 0);
                const meshLL = new THREE.Mesh(botLimbGeo, skinMat); meshLL.position.y = -0.35; meshLL.castShadow = true; this.legL.add(meshLL);

                this.legR = new THREE.Group(); this.legR.position.set(0.15, 0.6, 0);
                const meshLR = new THREE.Mesh(botLimbGeo, skinMat); meshLR.position.y = -0.35; meshLR.castShadow = true; this.legR.add(meshLR);

                this.armL = new THREE.Group(); this.armL.position.set(-0.4, 1.6, 0);
                const meshAL = new THREE.Mesh(botLimbGeo, skinMat); meshAL.position.y = -0.35; meshAL.castShadow = true; this.armL.add(meshAL);

                this.armR = new THREE.Group(); this.armR.position.set(0.4, 1.6, 0);
                const meshAR = new THREE.Mesh(botLimbGeo, skinMat); meshAR.position.y = -0.35; meshAR.castShadow = true; this.armR.add(meshAR);

                this.group.add(this.torso, this.shorts, this.head, this.legL, this.legR, this.armL, this.armR);
                scene.add(this.group);
            }
            
            update(dt, timeSec, ballInFlight, pPos, diffLevel, isPressing = false, offsideLineZ = -75) {
                let currentSpeed = this.baseSpeed; let target = new THREE.Vector3(); let intensity = diffLevel / 100; 

                if (this.role === 'defender') {
                    currentSpeed = 5.0 + (intensity * 6.0); 
                    if (ballInFlight && ball) { target.copy(ball.position); currentSpeed *= 1.2; } 
                    else {
                        if (isPressing) { target.copy(pPos); currentSpeed += (intensity * 7.0); } 
                        else {
                            target.copy(pPos); target.z -= 12 + (this.id * 3); target.x += (this.id - 2) * 8; 
                            let dx = pPos.x - this.group.position.x; let dz = pPos.z - this.group.position.z;
                            if (Math.sqrt(dx*dx + dz*dz) < 10) target.copy(pPos);
                        }
                    }
                } else if (this.role === 'teammate') {
                    if (ballInFlight && ball) {
                        if (this === aimedReceiver) {
                            target.copy(ball.position); if (typeof ballVel !== 'undefined') target.add(ballVel.clone().multiplyScalar(0.5)); 
                            currentSpeed *= 1.3; 
                        } else { target.copy(this.group.position); }
                    } else { 
                        let desiredZ = pPos.z - 20 - (this.id * 6);
                        let safeZ = Math.max(desiredZ, offsideLineZ + 1.0); 
                        target.set(Math.sin(timeSec + this.id) * 15 + (this.id - 2)*10, 0, safeZ); 
                    }
                } else if (this.role === 'myGoalie') {
                    currentSpeed = 10.0;
                    if (ballInFlight && ball && this === aimedReceiver) {
                        target.copy(ball.position); if (typeof ballVel !== 'undefined') target.add(ballVel.clone().multiplyScalar(0.5)); 
                        currentSpeed *= 1.3;
                    } else {
                        target.set(pPos.x * 0.4, 0, PL - 8); 
                    }
                } else if (this.role === 'oppGoalie') {
                    currentSpeed = 10.0 + (intensity * 4.0);
                    if (ballInFlight && ball && ballVel.z < 0 && ball.position.z < 0) { 
                        let timeToGoal = Math.max(0.1, (this.baseZ - ball.position.z) / ballVel.z);
                        let predX = ball.position.x + ballVel.x * timeToGoal;
                        predX = Math.max(-4.0, Math.min(4.0, predX)); 
                        target.set(predX, 0, this.baseZ);
                        currentSpeed = 25.0; 
                    } else {
                        target.set(pPos.x * 0.25, 0, this.baseZ); 
                    }
                }

                target.y = 0; let direction = new THREE.Vector3().subVectors(target, this.group.position);
                let moveDist = direction.length(); let actualSpeed = 0;

                if (moveDist > 0.5) {
                    actualSpeed = Math.min(currentSpeed * dt, moveDist);
                    this.group.position.add(direction.normalize().multiplyScalar(actualSpeed));
                    
                    let targetRot = Math.atan2(direction.x, direction.z);
                    let diff = targetRot - this.group.rotation.y;
                    while (diff < -Math.PI) diff += Math.PI * 2; while (diff > Math.PI) diff -= Math.PI * 2;
                    this.group.rotation.y += diff * 10 * dt;
                }

                let animSpeed = actualSpeed / dt;
                if (animSpeed > 1) {
                    let runCycle = timeSec * animSpeed * 1.5;
                    this.legL.rotation.x = Math.sin(runCycle) * 0.8; this.legR.rotation.x = -Math.sin(runCycle) * 0.8;
                    this.armL.rotation.x = -Math.sin(runCycle) * 0.8; this.armR.rotation.x = Math.sin(runCycle) * 0.8;
                    this.torso.rotation.y = Math.sin(runCycle) * 0.2;
                } else {
                    this.legL.rotation.x *= 0.9; this.legR.rotation.x *= 0.9;
                    this.armL.rotation.x *= 0.9; this.armR.rotation.x *= 0.9;
                    this.torso.rotation.y *= 0.9;
                }
            }

            dispose() { this.shirtMat.dispose(); this.shortsMat.dispose(); scene.remove(this.group); }
        }

        function determineBestPassOptionAtKick() {
            let bestTeammate = null; let maxScore = -Infinity; const oppGoalZ = -PL; 

            teammates.forEach(t => {
                let dx = playerPos.x - t.group.position.x; let dz = playerPos.z - t.group.position.z;
                let distToPlayer = Math.sqrt(dx*dx + dz*dz);
                let receiverDistToGoal = Math.abs(t.group.position.z - oppGoalZ);
                let playerDistToGoal = Math.abs(playerPos.z - oppGoalZ);
                let forwardProgression = playerDistToGoal - receiverDistToGoal;
                
                let closestDefDist = Infinity;
                defenders.forEach(d => {
                    let dDx = t.group.position.x - d.group.position.x; let dDz = t.group.position.z - d.group.position.z;
                    let dDist = Math.sqrt(dDx*dDx + dDz*dDz); if (dDist < closestDefDist) closestDefDist = dDist;
                });

                let linesBroken = 0;
                defenders.forEach(d => { if (d.group.position.z < playerPos.z && d.group.position.z > t.group.position.z) linesBroken++; });

                let score = 0;
                if (distToPlayer < 15) score -= 1000; else if (forwardProgression < 0) score -= 500; 
                else { score += forwardProgression * 2.0; score += linesBroken * 25.0; score += closestDefDist * 2.0; }

                if (score > maxScore) { maxScore = score; bestTeammate = t; }
            });
            return { teammate: bestTeammate, score: maxScore };
        }

        function clearSceneEntities() {
            if (ball) { scene.remove(ball); ball = null; }
            if (trailLine) { scene.remove(trailLine); if(trailLine.geometry) trailLine.geometry.dispose(); trailLine = null; }
            if (oppGoalKeeper) { oppGoalKeeper.dispose(); oppGoalKeeper = null; }
            teammates.forEach(t => t.dispose()); defenders.forEach(d => d.dispose());
            teammates = []; defenders = []; trailPoints = [];
        }

        function resetGame() {
            matchClock = 20.0; playerStamina = 100; chargeValue = 0;
            isBallInFlight = false; isCharging = false;
            playerVel.set(0,0,0); 
            
            const zones = [
                { name: "ATTACKING THIRD", color: "#ff2222", minZ: -40, maxZ: -20 },
                { name: "MIDFIELD BATTLE", color: "#ffcc00", minZ: -10, maxZ: 10 },
                { name: "DEFENSIVE BUILD-UP", color: "#00d4ff", minZ: 30, maxZ: 50 }
            ];
            
            const selectedZone = zones[Math.floor(Math.random() * zones.length)];
            const banner = document.getElementById('scenario-banner');
            banner.innerText = "SCENARIO // " + selectedZone.name;
            banner.style.color = selectedZone.color;
            
            let spawnZ = selectedZone.minZ + Math.random() * (selectedZone.maxZ - selectedZone.minZ);
            playerPos.set((Math.random()-0.5)*30, 0, spawnZ); 

            yaw = 0; pitchRot = 0;
            cameraTargetPos.copy(playerPos).setY(1.8);

            clearSceneEntities();

            for(let i=0; i<5; i++) {
                teammates.push(new PlayerBot(0x00ff88, 0xffffff, 'teammate', i)); 
                defenders.push(new PlayerBot(0xff2222, 0x111111, 'defender', i));
                
                let tZ = Math.max(-PL + 2, playerPos.z - 10 - (i*5));
                let dZ = Math.max(-PL + 2, playerPos.z - 15 - (i*6));

                teammates[i].group.position.set((i-2)*12, 0, tZ);
                defenders[i].group.position.set((i-2)*10, 0, dZ);
            }

            let myGoalKeeper = new PlayerBot(0xff00ff, 0x111111, 'myGoalie', 5);
            myGoalKeeper.group.position.set(0, 0, PL - 8);
            teammates.push(myGoalKeeper);

            oppGoalKeeper = new PlayerBot(0xffff00, 0x111111, 'oppGoalie', 6);
            let distOffLine = Math.random() < 0.4 ? (Math.random() * 12 + 2) : 1; 
            oppGoalKeeper.baseZ = -PL + distOffLine;
            oppGoalKeeper.group.position.set(0, 0, oppGoalKeeper.baseZ);
            
            fbContainer.style.display = 'none'; crosshair.style.transform = 'translate(-50%, -50%) scale(1)';
            isRoundActive = true;
        }

        function fireBall() {
            isBallInFlight = true; playerPosAtKick.copy(playerPos);
            let camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            
            let evaluation = determineBestPassOptionAtKick();
            tacticalBestTeammate = evaluation.teammate; idealScoreAtKick = evaluation.score;

            let minScore = Infinity; aimedReceiver = teammates[0];
            teammates.forEach(t => {
                let toTeammate = new THREE.Vector3().subVectors(t.group.position, playerPos);
                let dist = toTeammate.length(); let angle = camDir.angleTo(toTeammate.clone().normalize());
                if (angle < Math.PI / 2.5) { 
                    let passScore = (Math.sin(angle) * dist) + (dist * 0.15); 
                    if (passScore < minScore) { minScore = passScore; aimedReceiver = t; }
                }
            });

            ball = new THREE.Mesh(ballGeo, ballMat); ball.castShadow = true; scene.add(ball);
            ball.position.copy(playerPos).add(new THREE.Vector3(0, 0.5, 0)).add(camDir.clone().multiplyScalar(1.2));
            
            let chargeMultiplier = Math.pow(chargeValue, 1.5); let kickForce = 18 + (chargeMultiplier * 45);
            ballVel.copy(camDir).multiplyScalar(kickForce); ballVel.y += 3 + (chargeValue * 8); 

            const trailGeo = new THREE.BufferGeometry();
            trailLine = new THREE.Line(trailGeo, trailMat); scene.add(trailLine);
            crosshair.style.transform = 'translate(-50%, -50%) scale(1)';
        }

        function triggerFeedback(mainText, subText, color, delay = 3500) {
            if (!isRoundActive) return; isRoundActive = false; 
            fbMain.innerText = mainText; fbSub.innerText = subText;
            fbContainer.style.borderColor = color; fbMain.style.color = color;
            fbContainer.style.boxShadow = `0 20px 60px rgba(0,0,0,0.9), inset 0 0 30px ${color}33`;
            fbContainer.style.display = 'block';
            for (let key in keys) keys[key] = false; setTimeout(resetGame, delay);
        }

        function evaluatePassResult(receiver) {
            let oppGoalZ = -PL; 
            let dx = playerPos.x - receiver.group.position.x; let dz = playerPos.z - receiver.group.position.z;
            let dist = Math.sqrt(dx*dx + dz*dz);
            let receiverDistToGoal = Math.abs(receiver.group.position.z - oppGoalZ);
            let playerDistToGoal = Math.abs(playerPos.z - oppGoalZ);
            let forwardProgression = playerDistToGoal - receiverDistToGoal;
            
            let closestDefDist = Infinity;
            defenders.forEach(d => { let dDist = receiver.group.position.distanceTo(d.group.position); if (dDist < closestDefDist) closestDefDist = dDist; });

            let linesBroken = 0;
            defenders.forEach(d => { if (d.group.position.z < playerPos.z && d.group.position.z > receiver.group.position.z) linesBroken++; });

            let rating = 0;
            if (dist < 15) rating = Math.floor(Math.random() * 15) + 15; 
            else if (forwardProgression < 0) rating = Math.floor(Math.random() * 20) + 30; 
            else {
                let rawScore = (forwardProgression * 2.0) + (linesBroken * 25.0) + (closestDefDist * 2.0);
                if (idealScoreAtKick > 0) {
                    let ratio = Math.max(0, Math.min(1, rawScore / idealScoreAtKick));
                    rating = Math.floor(45 + (Math.pow(ratio, 2.5) * 50)); 
                } else rating = 45; 
            }
            
            if (receiver === tacticalBestTeammate && rating >= 50) rating = Math.floor(Math.random() * 3) + 98; 
            if (receiver !== tacticalBestTeammate && tacticalBestTeammate) tacticalBestTeammate.shirtMat.color.setHex(0xffff00);

            let color = rating >= 80 ? "#00ff88" : (rating >= 50 ? "#ffcc00" : "#ff4444");
            triggerFeedback("RATING: " + rating, "VISION SCORE", color, 4000);
        }

        function evaluateShotResult(isGoal) {
            let distToGoal = playerPosAtKick.distanceTo(new THREE.Vector3(0, 0, -PL));
            
            let mainText = isGoal ? "GOAL!" : "MISSED SHOT";
            let subText = ""; let color = isGoal ? "#00ff88" : "#ff4444";
            let elitePassAvailable = idealScoreAtKick > 115;

            if (isGoal) {
                if (distToGoal > 35) {
                    subText = "WORLD CLASS LOB!";
                } else if (distToGoal > 20) {
                    subText = "ABSOLUTE SCREAMER!";
                } else {
                    subText = "CLINICAL FINISH!";
                }
            } else {
                if (distToGoal > 45) {
                    subText = "POOR DECISION - WAY TOO FAR";
                } else if (elitePassAvailable && distToGoal > 25) { 
                    subText = "SELFISH - MISSED OPEN TEAMMATE";
                } else if (distToGoal <= 28 && !elitePassAvailable) {
                    subText = "UNLUCKY - RIGHT IDEA TO SHOOT";
                } else {
                    subText = "POOR EXECUTION";
                }
            }

            if (tacticalBestTeammate && elitePassAvailable && distToGoal > 25 && !isGoal) {
                tacticalBestTeammate.shirtMat.color.setHex(0xffff00); 
            }

            triggerFeedback(mainText, subText, color, 4500);
        }

        // --- INPUT HANDLING ---
        window.addEventListener('keydown', e => { 
            if(e.code === 'KeyW') keys.w = true; if(e.code === 'KeyS') keys.s = true;
            if(e.code === 'KeyA') keys.a = true; if(e.code === 'KeyD') keys.d = true;
            if(e.code === 'ShiftLeft') keys.shift = true;
            if(e.code === 'Space' && !isBallInFlight && isRoundActive) isCharging = true;
        });
        window.addEventListener('keyup', e => { 
            if(e.code === 'KeyW') keys.w = false; if(e.code === 'KeyS') keys.s = false;
            if(e.code === 'KeyA') keys.a = false; if(e.code === 'KeyD') keys.d = false;
            if(e.code === 'ShiftLeft') keys.shift = false;
            if(e.code === 'Space' && isCharging) { isCharging = false; fireBall(); }
        });
        document.addEventListener('mousemove', e => { 
            if (document.pointerLockElement) { yaw -= e.movementX * 0.002; pitchRot = Math.max(-0.8, Math.min(0.8, pitchRot - e.movementY * 0.002)); } 
        });
        document.addEventListener('click', () => { document.body.requestPointerLock(); });

        // --- MAIN GAME LOOP ---
        function animate(now) {
            requestAnimationFrame(animate);
            let dt = Math.min((now - lastTime) / 1000, 0.05); lastTime = now;
            let timeSec = now * 0.001;

            camera.rotation.set(pitchRot, yaw, 0, 'YXZ');
            
            if (isRoundActive) {
                if (!isBallInFlight) {
                    matchClock -= dt; 
                    document.getElementById('timer-bar').style.width = Math.max(0, matchClock/20*100) + "%";
                    if (matchClock <= 0) triggerFeedback("TIME EXPIRED", "HELD BALL TOO LONG", "#ff2222");

                    let input = new THREE.Vector3();
                    if (keys.w) input.z -= 1; if (keys.s) input.z += 1;
                    if (keys.a) input.x -= 1; if (keys.d) input.x += 1;
                    if (input.lengthSq() > 0) input.normalize().applyAxisAngle(new THREE.Vector3(0,1,0), yaw);

                    let isSprinting = keys.shift && playerStamina > 0; let accel = isSprinting ? 28 : 15; let maxSpd = isSprinting ? 14 : 7;

                    if (input.lengthSq() > 0) {
                        playerVel.add(input.multiplyScalar(accel * dt)); playerVel.clampLength(0, maxSpd);
                        if (isSprinting) playerStamina = Math.max(0, playerStamina - 30 * dt);
                    } else {
                        playerVel.multiplyScalar(Math.pow(0.005, dt)); playerStamina = Math.min(100, playerStamina + 15 * dt);
                    }

                    playerPos.add(playerVel.clone().multiplyScalar(dt));
                    playerPos.x = Math.max(-PW + 1, Math.min(PW - 1, playerPos.x)); playerPos.z = Math.max(-PL + 1, Math.min(PL - 1, playerPos.z));

                    let targetFOV = isSprinting && input.lengthSq() > 0 ? SPRINT_FOV : BASE_FOV;
                    camera.fov += (targetFOV - camera.fov) * 10 * dt; camera.updateProjectionMatrix();
                }

                document.getElementById('stamina-bar').style.width = playerStamina + "%";
                document.getElementById('stamina-bar').style.background = playerStamina < 20 ? "#ff2222" : "#00d4ff";
                document.getElementById('stamina-bar').style.boxShadow = playerStamina < 20 ? "0 0 10px #ff2222" : "0 0 10px #00d4ff";
                
                if (isCharging) {
                    chargeValue = Math.min(1, chargeValue + dt * 2.5);
                    if(chargeValue > 0.95) crosshair.style.transform = `translate(-50%, -50%) scale(${1 + Math.sin(timeSec*20)*0.3})`;
                }
                document.getElementById('power-bar').style.width = (chargeValue * 100) + "%";

                if (isBallInFlight && ball) {
                    ballVel.y -= GRAVITY * dt; ballVel.multiplyScalar(1 - (0.3 * dt)); 
                    ball.position.add(ballVel.clone().multiplyScalar(dt));
                    ball.rotation.x += ballVel.z * dt; ball.rotation.z -= ballVel.x * dt;

                    trailPoints.push(ball.position.clone());
                    if (trailPoints.length > 50) trailPoints.shift(); trailLine.geometry.setFromPoints(trailPoints);

                    if (ball.position.y <= BALL_RADIUS) {
                        ball.position.y = BALL_RADIUS; ballVel.y *= -RESTITUTION;
                        ballVel.x *= ROLLING_FRICTION; ballVel.z *= ROLLING_FRICTION;
                        if (Math.abs(ballVel.y) < 0.5) ballVel.y = 0;
                    }

                    let passCompleted = false;

                    if (ball.position.z <= -PL + BALL_RADIUS) {
                        passCompleted = true;
                        let isGoal = Math.abs(ball.position.x) < 3.66 && ball.position.y < 2.44;
                        if (isGoal) {
                            ballVel.set(0,0,0);
                            ball.position.z = Math.max(ball.position.z, -PL - 1.5);
                        }
                        evaluateShotResult(isGoal);
                    } else if (Math.abs(ball.position.x) >= PW || ball.position.z >= PL) {
                        passCompleted = true; triggerFeedback("OUT OF BOUNDS", "WASTED POSSESSION", "#ff4444");
                    }

                    if (oppGoalKeeper && !passCompleted && ball.position.distanceTo(oppGoalKeeper.group.position) < 2.2 && ball.position.y < 3.0) {
                        passCompleted = true; ballVel.set(0, 0, 0);
                        ball.position.copy(oppGoalKeeper.group.position); ball.position.y = BALL_RADIUS; ball.position.z += 0.6; 
                        triggerFeedback("SAVED!", "KEEPER DENIES YOU", "#ffcc00");
                    }

                    teammates.forEach(t => {
                        if (!passCompleted && ball.position.distanceTo(t.group.position) < 2.5 && ball.position.y < 2.5) {
                            passCompleted = true; ballVel.set(0, 0, 0);
                            let toBall = ball.position.clone().sub(t.group.position).normalize();
                            ball.position.copy(t.group.position).add(toBall.multiplyScalar(0.6));
                            ball.position.y = BALL_RADIUS; evaluatePassResult(t);
                        }
                    });

                    defenders.forEach(d => {
                        if (!passCompleted && ball.position.distanceTo(d.group.position) < 2.0 && ball.position.y < 2.5) {
                            passCompleted = true; ballVel.set(0, 0, 0);
                            ball.position.copy(d.group.position); ball.position.y = BALL_RADIUS; ball.position.z -= 0.6; 
                            triggerFeedback("INTERCEPTED", "POOR DECISION", "#ff2222");
                        }
                    });

                    if (!passCompleted && ballVel.length() < 0.5 && ball.position.y <= BALL_RADIUS + 0.1) {
                        triggerFeedback("DEAD BALL", "DID NOT REACH TARGET", "#aaa");
                    }
                }

                const dLevel = parseInt(slider.value); let closestDef = null; let minDist = Infinity;
                let lastDefenderZ = 75; 

                defenders.forEach(d => {
                    let dx = d.group.position.x - playerPos.x; let dz = d.group.position.z - playerPos.z;
                    let dist2D = Math.sqrt(dx*dx + dz*dz); if (dist2D < minDist) { minDist = dist2D; closestDef = d; }
                    if (d.group.position.z < lastDefenderZ) lastDefenderZ = d.group.position.z;
                });

                let offsideLineZ = Math.min(playerPos.z, lastDefenderZ);

                if (oppGoalKeeper) oppGoalKeeper.update(dt, timeSec, isBallInFlight, playerPos, dLevel);
                teammates.forEach(t => t.update(dt, timeSec, isBallInFlight, playerPos, dLevel, false, offsideLineZ));
                defenders.forEach(d => { 
                    d.update(dt, timeSec, isBallInFlight, playerPos, dLevel, (d === closestDef));
                    let dx = d.group.position.x - playerPos.x; let dz = d.group.position.z - playerPos.z;
                    if (isRoundActive && Math.sqrt(dx*dx + dz*dz) < 1.6) {
                        triggerFeedback("ROUND OVER", "TACKLED BY DEFENDER", "#ff2222", 3000); playerVel.set(0, 0, 0);
                    }
                });

                // --- BOT COLLISION & SEPARATION LOGIC ---
                let allBots = [...teammates, ...defenders];
                if (oppGoalKeeper) allBots.push(oppGoalKeeper);

                for (let i = 0; i < allBots.length; i++) {
                    for (let j = i + 1; j < allBots.length; j++) {
                        let posA = allBots[i].group.position;
                        let posB = allBots[j].group.position;
                        let dx = posA.x - posB.x;
                        let dz = posA.z - posB.z;
                        let distSq = dx*dx + dz*dz;
                        let separationDist = 3.0; // Keep players 3 meters apart

                        if (distSq > 0.0001 && distSq < separationDist * separationDist) {
                            let dist = Math.sqrt(distSq);
                            let overlap = (separationDist - dist) * 0.5; 
                            let pushX = (dx / dist) * overlap;
                            let pushZ = (dz / dist) * overlap;

                            // Goalies anchor their lines, so don't push them around
                            if (allBots[i].role !== 'myGoalie' && allBots[i].role !== 'oppGoalie') {
                                posA.x += pushX; posA.z += pushZ;
                            }
                            if (allBots[j].role !== 'myGoalie' && allBots[j].role !== 'oppGoalie') {
                                posB.x -= pushX; posB.z -= pushZ;
                            }
                        }
                    }
                }
            }

            let idealCamPos = playerPos.clone().add(new THREE.Vector3(0, 1.8, 0));
            let speedRatio = playerVel.length() / 14; idealCamPos.y += Math.sin(timeSec * 15) * (0.15 * speedRatio);
            cameraTargetPos.lerp(idealCamPos, 15 * dt); camera.position.copy(cameraTargetPos);
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        resetGame(); animate(performance.now());
    </script>
</body>
